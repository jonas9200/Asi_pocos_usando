<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGS Irrigação — Lista de Equipamentos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary:  #2e7d32;
            --secondary:#00695c;
            --accent:   #2196F3;
            --success:  #4CAF50;
            --warning:  #FFC107;
            --danger:   #F44336;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
        body {
            background: linear-gradient(135deg,#1e3a8a,#1a2a6c,#0066cc);
            color: white; min-height:100vh; padding:20px;
        }
        .container {
            max-width: 1400px; margin:0 auto;
            background: rgba(0,0,0,0.7);
            border-radius:15px; padding:25px;
            box-shadow:0 10px 30px rgba(0,0,0,0.5);
        }
        header { text-align:center; margin-bottom:22px; padding-bottom:14px; border-bottom:2px solid var(--accent); }
        h1 { font-size:2.5rem; color:var(--accent); margin-bottom:6px; }
        .subtitle { font-size:1.1rem; opacity:.85; }

        /* MQTT status bar */
        .mqtt-bar {
            display: flex; align-items:center; justify-content:center;
            gap: 8px; margin-bottom:18px;
            font-size:.82rem; color:rgba(255,255,255,0.5);
        }
        .mqtt-dot {
            width:8px; height:8px; border-radius:50%;
            background:var(--warning); flex-shrink:0; transition:all .3s;
        }
        .mqtt-dot.ok  { background:var(--success); box-shadow:0 0 7px var(--success); animation:gpulse 2s infinite; }
        .mqtt-dot.err { background:var(--danger);  box-shadow:0 0 7px var(--danger); }

        @keyframes gpulse { 0%,100%{box-shadow:0 0 4px var(--success)} 50%{box-shadow:0 0 13px var(--success)} }
        @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:.35} }
        @keyframes pulse  { 0%{box-shadow:0 0 0 0 rgba(76,175,80,.7)} 70%{box-shadow:0 0 0 7px rgba(76,175,80,0)} 100%{box-shadow:0 0 0 0 rgba(76,175,80,0)} }

        /* View bar */
        .view-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid rgba(255,255,255,0.12);
        }
        .view-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
        }
        .view-title i { font-size: 1.1rem; }
        .view-switch-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 20px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: .88rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .25s;
            box-shadow: 0 3px 10px rgba(33,150,243,0.35);
            letter-spacing: .3px;
        }
        .view-switch-btn:hover { background:#1976D2; transform:translateY(-2px); box-shadow:0 5px 16px rgba(33,150,243,0.45); }
        .tab-pane { display:none; }
        .tab-pane.active { display:block; }

        /* Map */
        #map {
            width: 100%;
            height: 520px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.12);
            z-index: 1;
        }

        /* Custom Leaflet popup */
        .leaflet-popup-content-wrapper {
            background: #0e1828 !important;
            border: 1px solid rgba(33,150,243,0.4) !important;
            border-radius: 10px !important;
            color: white !important;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5) !important;
        }
        .leaflet-popup-tip { background: #0e1828 !important; }
        .leaflet-popup-content { margin: 14px 16px !important; min-width: 180px; }
        .popup-name  { font-size:1rem; font-weight:700; color:#2196F3; margin-bottom:8px; }
        .popup-row   { display:flex; justify-content:space-between; font-size:.82rem; padding:4px 0; border-bottom:1px dashed rgba(255,255,255,0.1); }
        .popup-row:last-of-type { border-bottom:none; }
        .popup-key   { color:rgba(255,255,255,0.55); font-weight:600; }
        .popup-val   { color:#2196F3; font-weight:600; text-align:right; }
        .popup-btn   { display:block; width:100%; margin-top:10px; padding:8px; background:#2196F3; border:none; border-radius:6px; color:white; font-weight:700; font-size:.82rem; cursor:pointer; text-align:center; transition:background .2s; }
        .popup-btn:hover { background:#1976D2; }

        /* Marker icon */
        .eq-marker {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: 3px solid white;
            display: flex; align-items:center; justify-content:center;
            font-size: .8rem;
            box-shadow: 0 3px 10px rgba(0,0,0,0.5);
            transition: all .3s;
        }
        .eq-marker.online-ligado   { background:#1565c0; border-color:#2196F3; }
        .eq-marker.online-desligado{ background:#2e7d32; border-color:#4CAF50; }
        .eq-marker.offline         { background:#b71c1c; border-color:#F44336; }
        .eq-marker.waiting         { background:#555;    border-color:#aaa; }

        .map-legend {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 12px;
            font-size: .8rem;
            color: rgba(255,255,255,0.6);
            padding: 0 4px;
        }
        .legend-item { display:flex; align-items:center; gap:7px; }
        .legend-dot  { width:12px; height:12px; border-radius:50%; flex-shrink:0; }

        /* Search */
        .filter-bar { display:flex; margin-bottom:20px; }
        .search-input {
            flex:1; padding:10px 14px;
            background:rgba(0,0,0,0.35); border:1px solid rgba(255,255,255,0.2);
            border-radius:7px; color:white; font-size:.9rem;
        }
        .search-input:focus { outline:none; border-color:var(--accent); }
        .search-input::placeholder { color:rgba(255,255,255,0.38); }

        /* Dashboard */
        .dashboard { display:grid; grid-template-columns:repeat(auto-fill,minmax(310px,1fr)); gap:18px; }

        /* Card */
        .card {
            background:rgba(30,30,50,0.85); border-radius:10px; padding:20px;
            box-shadow:0 5px 15px rgba(0,0,0,0.3); border-left:4px solid rgba(255,255,255,0.2);
            transition:all .35s; cursor:pointer;
        }
        .card:hover      { transform:translateY(-4px); box-shadow:0 10px 24px rgba(0,0,0,0.45); }
        .card.online     { border-left-color:var(--success); }
        .card.offline    { border-left-color:var(--danger); }

        .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:13px; gap:8px; }
        .card-name   { font-size:1.2rem; font-weight:bold; color:var(--accent); display:flex; align-items:center; gap:7px; flex-wrap:wrap; }

        /* Status badge */
        .status-badge {
            display: inline-flex; align-items:center; gap:5px;
            border-radius:12px; padding:4px 11px;
            font-size:.7rem; font-weight:700; white-space:nowrap; flex-shrink:0;
            transition: all .35s;
        }
        .status-badge.waiting {
            background:rgba(255,179,0,0.14); border:1px solid rgba(255,179,0,0.38); color:var(--warning);
        }
        .status-badge.online {
            background:rgba(76,175,80,0.18); border:1px solid var(--success); color:var(--success);
        }
        .status-badge.offline {
            background:rgba(244,67,54,0.14); border:1px solid rgba(244,67,54,0.45); color:var(--danger);
        }
        .badge-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
        .status-badge.waiting .badge-dot { background:var(--warning); animation:blink 1.2s infinite; }
        .status-badge.online  .badge-dot { background:var(--success); animation:pulse 2s infinite; }
        .status-badge.offline .badge-dot { background:var(--danger); }

        .type-chip {
            display:inline-block; background:rgba(33,150,243,0.15);
            border:1px solid rgba(33,150,243,0.32); border-radius:9px;
            padding:2px 8px; font-size:.7rem; font-weight:600;
        }
        .card-detail { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px dashed rgba(255,255,255,0.11); font-size:.86rem; }
        .card-detail:last-of-type { border-bottom:none; }
        .detail-label { font-weight:600; color:rgba(255,255,255,0.65); }
        .detail-value { color:var(--accent); text-align:right; }

        /* JSON data block in card */
        .json-block {
            margin-top: 10px;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 7px;
            overflow: hidden;
        }
        .json-block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 11px;
            font-size: .72rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.4);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            cursor: default;
        }
        .json-block-header span { color: var(--accent); font-size:.68rem; }
        .json-rows { padding: 6px 4px; }
        .json-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            font-size: .76rem;
            border-radius: 4px;
            transition: background .15s;
        }
        .json-row:hover { background: rgba(255,255,255,0.05); }
        .json-key  { color: rgba(255,255,255,0.5); font-family: monospace; word-break:break-all; }
        .json-val  { color: #81d4fa; font-family: monospace; text-align:right; word-break:break-all; max-width:55%; }
        .json-val.v-true  { color: #4CAF50; font-weight:700; }
        .json-val.v-false { color: #F44336; font-weight:700; }
        .json-val.v-num   { color: #ffcc80; }
        .json-empty { padding:10px 8px; font-size:.76rem; color:rgba(255,255,255,0.25); text-align:center; font-style:italic; }
        .access-btn {
            width:100%; padding:11px; border:none; border-radius:7px;
            background:var(--accent); color:white; font-weight:bold; font-size:.92rem;
            cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
            transition:all .25s;
        }
        .access-btn:hover { background:#1976D2; transform:translateY(-2px); }

        .loading,.empty { grid-column:1/-1; text-align:center; padding:40px; opacity:.7; }
        .empty i { font-size:3rem; display:block; margin-bottom:13px; }

        @media (max-width:768px) {
            h1 { font-size:2rem; }
            .dashboard { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1><i class="fas fa-water"></i> AGS Irrigação (Poços)</h1>
        <p class="subtitle"></p>
    </header>

    <div class="mqtt-bar">
        <div class="mqtt-dot" id="mqtt-dot"></div>
        <span id="mqtt-label">Conectando ao Servidor...</span>
    </div>

    <!-- ABA LISTA -->
    <div class="tab-pane active" id="tab-lista">
        <div class="view-bar">
            <div class="view-title"><i class="fa-solid fa-list"></i> Lista de Poços</div>
            <button class="view-switch-btn" onclick="switchTab('mapa')">
                <i class="fa-solid fa-map"></i>
            </button>
        </div>
        <div class="filter-bar">
            <input class="search-input" id="search" placeholder="🔍  Buscar por nome ou localização...">
        </div>
        <div class="dashboard" id="dashboard">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> Carregando equipamentos...</div>
        </div>
    </div>

    <!-- ABA MAPA -->
    <div class="tab-pane" id="tab-mapa">
        <div class="view-bar">
            <div class="view-title"><i class="fa-solid fa-map"></i> Mapa dos Poços</div>
            <button class="view-switch-btn" onclick="switchTab('lista')">
                <i class="fa-solid fa-list"></i>
            </button>
        </div>
        <div id="map"></div>
        <div class="map-legend">
            <div class="legend-item"><div class="legend-dot" style="background:#2196F3;border:2px solid #64B5F6"></div> Online · Ligado</div>
            <div class="legend-item"><div class="legend-dot" style="background:#4CAF50;border:2px solid #81C784"></div> Online · Desligado</div>
            <div class="legend-item"><div class="legend-dot" style="background:#F44336;border:2px solid #E57373"></div> Offline</div>
            <div class="legend-item"><div class="legend-dot" style="background:#777;border:2px solid #aaa"></div> Aguardando</div>
        </div>
    </div>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
<script>
const BROKER    = 'wss://mqtt.aguasanta.agr.br';
const MQTT_USER = 'coas';
const MQTT_PASS = 'AguaSanta@452';

let equipments = [];
let mqttClient = null;
const deviceStatus = {}; // poco_id → 'online' | 'offline' | 'waiting'
const wellState    = {}; // poco_id → 'LIGADO' | 'DESLIGADO' | null
const rawJson      = {}; // poco_id → last parsed JSON object from topic_dados

// ── MAP ──────────────────────────────────────────────────
let map = null;
const mapMarkers = {}; // eq.id → L.marker

const ICONS = {
    'Poço':         'fa-tint',
    'Pivô Central': 'fa-sync-alt',
    'Linear':       'fa-arrows-alt-h',
    'Aspersor':     'fa-shower',
    'Pluviômetro':  'fa-cloud-rain',
    'Outro':        'fa-cog'
};

// ── TABS ─────────────────────────────────────────────────
function switchTab(name) {
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'mapa') initMap();
}

function initMap() {
    if (map) {
        setTimeout(() => { map.invalidateSize(); updateAllMarkers(); }, 100);
        return;
    }

    map = L.map('map');

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles © Esri — Source: Esri, Maxar, Earthstar Geographics',
        maxZoom: 19
    }).addTo(map);

    equipments.forEach(eq => addMarker(eq));

    const withCoords = equipments.filter(e => e.lat && e.lng);
    if (withCoords.length === 1) {
        map.setView([withCoords[0].lat, withCoords[0].lng], 16);
    } else if (withCoords.length > 1) {
        const bounds = L.latLngBounds(withCoords.map(e => [e.lat, e.lng]));
        map.fitBounds(bounds, { padding: [50, 50], maxZoom: 17 });
    } else {
        map.setView([-15.0, -47.0], 5);
    }

    setTimeout(() => map.invalidateSize(), 200);
}

function markerClass(eqId) {
    const eq = equipments.find(e => e.id === eqId);
    if (!eq) return 'waiting';
    const st = deviceStatus[eq.poco_id] || 'waiting';
    const ws = wellState[eq.poco_id];
    if (st === 'offline')  return 'offline';
    if (st === 'waiting')  return 'waiting';
    return ws === 'Ligado' ? 'online-ligado' : 'online-desligado';
}

function makeIcon(eqId) {
    const cls  = markerClass(eqId);
    const eq   = equipments.find(e => e.id === eqId);
    const icon = eq ? (ICONS[eq.type] || 'fa-cog') : 'fa-cog';
    const name = eq ? eq.name : '';

    // Cor do label baseada no estado
    const labelColor = cls === 'online-ligado'    ? '#64B5F6'
                     : cls === 'online-desligado' ? '#4CAF50'
                     : cls === 'offline'          ? '#EF9A9A'
                     : '#ccc';

    return L.divIcon({
        className: '',
        html: `
            <div style="display:flex;align-items:center;gap:6px;white-space:nowrap">
                <div class="eq-marker ${cls}">
                    <i class="fas ${icon}" style="color:white;font-size:.75rem"></i>
                </div>
                <span style="
                    background:rgba(0,0,0,0.72);
                    color:${labelColor};
                    font-size:.72rem;
                    font-weight:700;
                    padding:3px 8px;
                    border-radius:10px;
                    border:1px solid rgba(255,255,255,0.15);
                    letter-spacing:.3px;
                    text-shadow:0 1px 3px rgba(0,0,0,.8);
                    pointer-events:none;
                ">${name}</span>
            </div>`,
        iconSize:   [32, 32],
        iconAnchor: [16, 16],
        popupAnchor:[0, -22],
    });
}

function popupHTML(eq) {
    const st  = deviceStatus[eq.poco_id] || 'waiting';
    const ws  = wellState[eq.poco_id];
    const rj  = rawJson[eq.poco_id] || {};

    const stLabel = st === 'online'  ? '<span style="color:#4CAF50;font-weight:700">● Online</span>'
                  : st === 'offline' ? '<span style="color:#F44336;font-weight:700">● Offline</span>'
                  : '<span style="color:#FFC107;font-weight:700">● Aguardando</span>';

    const wsLabel = ws === 'Ligado'    ? '<span style="color:#4CAF50;font-weight:700">Ligado</span>'
                  : ws === 'Desligado' ? '<span style="color:#F44336;font-weight:700">Desligado</span>'
                  : '<span style="color:rgba(255,255,255,.35)">---</span>';

    const auto  = rj.Aut_man === '1' || rj.Aut_man === 1;
    const falha = rj.Falha   === '1' || rj.Falha   === 1;

    const modoLabel   = rj.Aut_man != null
        ? (auto  ? '<span style="color:#4CAF50">Automático</span>' : '<span style="color:#FFC107">Manual</span>')
        : '<span style="color:rgba(255,255,255,.35)">---</span>';

    const falhaLabel  = rj.Falha != null
        ? (falha ? '<span style="color:#F44336;font-weight:700">Com Falha</span>' : '<span style="color:#4CAF50">Sem Falha</span>')
        : '<span style="color:rgba(255,255,255,.35)">---</span>';

    const tsLabel = rj.Ultima_atualizacao || rj.Registro || '---';

    const coordLabel = (eq.lat && eq.lng)
        ? `${parseFloat(eq.lat).toFixed(6)}, ${parseFloat(eq.lng).toFixed(6)}`
        : '—';

    return `
        <div class="popup-name">
            <i class="fas ${ICONS[eq.type]||'fa-cog'}"></i> ${eq.name}
        </div>
        <div class="popup-row"><span class="popup-key">Localização:</span><span class="popup-val">${eq.location || '—'}</span></div>
        <div class="popup-row"><span class="popup-key">Equipamento:</span><span class="popup-val">${stLabel}</span></div>
        <div class="popup-row"><span class="popup-key">Estado:</span><span class="popup-val">${wsLabel}</span></div>
        <div class="popup-row"><span class="popup-key">Modo:</span><span class="popup-val">${modoLabel}</span></div>
        <div class="popup-row"><span class="popup-key">Falha:</span><span class="popup-val">${falhaLabel}</span></div>
        <div class="popup-row"><span class="popup-key">Atualizado:</span><span class="popup-val" style="font-size:.77rem">${tsLabel}</span></div>
        ${eq.description ? `<div class="popup-row"><span class="popup-key">Descrição</span><span class="popup-val">${eq.description}</span></div>` : ''}
        <button class="popup-btn" onclick="window.location.href='/painel?id=${eq.id}'">
            <i class="fas fa-tachometer-alt"></i> Acessar Painel
        </button>`
;
}

function addMarker(eq) {
    if (!eq.lat || !eq.lng || !map) return;
    if (mapMarkers[eq.id]) {
        mapMarkers[eq.id].remove();
        delete mapMarkers[eq.id];
    }
    const marker = L.marker([eq.lat, eq.lng], { icon: makeIcon(eq.id) })
        .bindPopup(popupHTML(eq), { maxWidth: 280 })
        .addTo(map);
    mapMarkers[eq.id] = marker;
}

function updateAllMarkers() {
    if (!map) return;
    equipments.forEach(eq => {
        if (!eq.lat || !eq.lng) return;
        const m = mapMarkers[eq.id];
        if (!m) { addMarker(eq); return; }
        m.setIcon(makeIcon(eq.id));
        if (m.isPopupOpen()) m.setPopupContent(popupHTML(eq));
    });
}

// ── MQTT ─────────────────────────────────────────────────
function connectMQTT() {
    mqttClient = mqtt.connect(BROKER, {
        clientId:       'AGS_OpList_' + Math.random().toString(16).substr(2, 8),
        username:       MQTT_USER,
        password:       MQTT_PASS,
        keepalive:      60,
        clean:          true,
        connectTimeout: 6000,
        reconnectPeriod:4000,
    });

    mqttClient.on('connect', () => {
        setMqttBar('ok', 'Servidor Online');
        subscribeAll();
    });

    mqttClient.on('message', (topic, payload) => {
        const msg = payload.toString().trim();

        // ── tópico status (online/offline) ──
        const eqByStatus = equipments.find(e => e.topic_status === topic);
        if (eqByStatus) {
            const st = (msg.toLowerCase() === 'online') ? 'online' : 'offline';
            if (deviceStatus[eqByStatus.poco_id] !== st) {
                deviceStatus[eqByStatus.poco_id] = st;
                updateCardBadge(eqByStatus.id, st);
            }
            return;
        }

        // ── tópico dados (JSON com estado do poço) ──
        const eqByDados = equipments.find(e => e.topic_dados === topic);
        if (eqByDados) {
            try {
                const data = JSON.parse(msg);
                rawJson[eqByDados.poco_id] = data;

                // Estado do poço
                const ligado = data.Ligado_desligado === '1' || data.Ligado_desligado === 1;
                const estado = ligado ? 'Ligado' : 'Desligado';
                wellState[eqByDados.poco_id] = estado;

                // Sempre atualiza todos os campos do card (inclusive timestamp)
                updateCardAllFields(eqByDados.id);

                // Sempre atualiza marcador do mapa
                const m = mapMarkers[eqByDados.id];
                if (m) {
                    m.setIcon(makeIcon(eqByDados.id));
                    if (m.isPopupOpen()) m.setPopupContent(popupHTML(eqByDados));
                }
            } catch(_) {}
        }
    });

    mqttClient.on('reconnect', () => setMqttBar('warn', 'Reconectando ao Servidor...'));
    mqttClient.on('close',     () => setMqttBar('err',  'Servidor desconectado'));
    mqttClient.on('error',     () => setMqttBar('err',  'Erro na conexão com o Servidor'));
}

function subscribeAll() {
    equipments.forEach(eq => {
        if (eq.topic_status) mqttClient.subscribe(eq.topic_status, { qos:1 });
        if (eq.topic_dados)  mqttClient.subscribe(eq.topic_dados,  { qos:1 });
    });
}

function setMqttBar(state, label) {
    const dot = document.getElementById('mqtt-dot');
    dot.className = 'mqtt-dot' + (state === 'ok' ? ' ok' : state === 'err' ? ' err' : '');
    document.getElementById('mqtt-label').textContent = label;
}

// Atualiza badge e borda do card sem re-renderizar a página inteira
function updateCardBadge(eqId, status) {
    const card  = document.querySelector(`.card[data-eq-id="${eqId}"]`);
    const badge = card && card.querySelector('.status-badge');
    if (card && badge) {
        card.classList.remove('online','offline');
        card.classList.add(status);
        badge.className = `status-badge ${status}`;
        const label = status === 'online' ? 'Online' : 'Offline';
        badge.innerHTML = `<span class="badge-dot"></span>${label}`;
    }
    // Atualiza marcador no mapa
    const m = mapMarkers[eqId];
    if (m) {
        m.setIcon(makeIcon(eqId));
        if (m.isPopupOpen()) {
            const eq = equipments.find(e => e.id === eqId);
            if (eq) m.setPopupContent(popupHTML(eq));
        }
    }
}

// Atualiza todos os campos dinâmicos do card a partir do rawJson
function updateCardAllFields(eqId) {
    const card = document.querySelector(`.card[data-eq-id="${eqId}"]`);
    if (!card) return;

    const eq  = equipments.find(e => e.id === eqId);
    const rj  = eq ? (rawJson[eq.poco_id] || {}) : {};
    const ws  = eq ? wellState[eq.poco_id] : null;

    // Estado do poço
    const wsEl = card.querySelector('.well-state-value');
    if (wsEl) {
        wsEl.textContent = ws || '---';
        wsEl.style.color = ws === 'Ligado' ? '#4CAF50' : ws === 'Desligado' ? '#F44336' : 'rgba(255,255,255,0.4)';
    }

    // Modo
    const modoEl = card.querySelector('.modo-value');
    if (modoEl) {
        const auto = rj.Aut_man === '1' || rj.Aut_man === 1;
        modoEl.textContent = rj.Aut_man != null ? (auto ? 'Automático' : 'Manual') : '---';
        modoEl.style.color = rj.Aut_man != null ? (auto ? '#4CAF50' : '#FFC107') : 'rgba(255,255,255,0.4)';
    }

    // Falha
    const falhaEl = card.querySelector('.falha-value');
    if (falhaEl) {
        const falha = rj.Falha === '1' || rj.Falha === 1;
        falhaEl.textContent = rj.Falha != null ? (falha ? 'Com Falha' : 'Sem Falha') : '---';
        falhaEl.style.color = rj.Falha != null ? (falha ? '#F44336' : '#4CAF50') : 'rgba(255,255,255,0.4)';
    }

    // Última atualização — sempre atualiza pois muda a cada mensagem
    const tsEl = card.querySelector('.ts-value');
    if (tsEl) tsEl.textContent = rj.Ultima_atualizacao || rj.Registro || '---';
}

// Renderiza o JSON completo no bloco do card
function updateCardJson(eqId, data) {
    const block = document.querySelector(`.card[data-eq-id="${eqId}"] .json-rows`);
    if (!block) return;
    // Chaves a ocultar (já exibidas como campos dedicados ou irrelevantes para o operador)
    const SKIP = new Set(['Ip']);
    block.innerHTML = '';
    Object.entries(data).forEach(([k, v]) => {
        if (SKIP.has(k)) return;
        const row = document.createElement('div');
        row.className = 'json-row';
        let valClass = 'json-val';
        let display  = String(v);
        if (v === true  || v === 1  || v === '1')  { valClass += ' v-true';  }
        if (v === false || v === 0  || v === '0')  { valClass += ' v-false'; }
        if (typeof v === 'number' && v !== 0 && v !== 1) valClass += ' v-num';
        row.innerHTML = `<span class="json-key">${k}</span><span class="${valClass}">${display}</span>`;
        block.appendChild(row);
    });
}

// ── LOAD ─────────────────────────────────────────────────
async function load() {
    try {
        const r = await fetch('/api/equipments');
        equipments = await r.json();
        // Marca todos como aguardando (não reseta os que já têm status)
        equipments.forEach(eq => {
            if (!deviceStatus[eq.poco_id]) deviceStatus[eq.poco_id] = 'waiting';
            if (!wellState[eq.poco_id])    wellState[eq.poco_id]    = null;
            if (!rawJson[eq.poco_id])      rawJson[eq.poco_id]      = null;
        });
        render();
        // Atualiza marcadores se o mapa já estiver aberto
        if (map) updateAllMarkers();
        // Se MQTT já conectado, inscreve nos novos equipamentos
        if (mqttClient && mqttClient.connected) subscribeAll();
    } catch(e) {
        document.getElementById('dashboard').innerHTML =
            '<div class="empty"><i class="fas fa-exclamation-triangle"></i><p>Erro ao carregar. Atualize a página.</p></div>';
    }
}

// ── RENDER ────────────────────────────────────────────────
function render() {
    const search = document.getElementById('search').value.toLowerCase();
    const dash   = document.getElementById('dashboard');
    dash.innerHTML = '';

    const filtered = equipments.filter(eq =>
        !search
        || eq.name.toLowerCase().includes(search)
        || (eq.location || '').toLowerCase().includes(search)
        || eq.poco_id.toLowerCase().includes(search)
    );

    if (filtered.length === 0) {
        dash.innerHTML = '<div class="empty"><i class="fas fa-search"></i><p>Nenhum equipamento encontrado.</p></div>';
        return;
    }

    filtered.forEach(eq => {
        const icon  = ICONS[eq.type] || 'fa-cog';
        const st    = deviceStatus[eq.poco_id] || 'waiting';
        const label = st === 'online' ? 'Online' : st === 'offline' ? 'Offline' : 'Aguardando...';
        const ws    = wellState[eq.poco_id];
        const wsLabel = ws || '---';
        const wsColor = ws === 'Ligado' ? '#4CAF50' : ws === 'Desligado' ? '#F44336' : 'rgba(255,255,255,0.4)';

        const rj = rawJson[eq.poco_id] || {};
        const auto  = rj.Aut_man != null ? (rj.Aut_man === '1' || rj.Aut_man === 1 ? 'Automático' : 'Manual') : '---';
        const autoColor = rj.Aut_man != null ? (rj.Aut_man === '1' || rj.Aut_man === 1 ? '#4CAF50' : '#FFC107') : 'rgba(255,255,255,0.4)';
        const falha = rj.Falha != null ? (rj.Falha === '1' || rj.Falha === 1 ? 'Com Falha' : 'Sem Falha') : '---';
        const falhaColor = rj.Falha != null ? (rj.Falha === '1' || rj.Falha === 1 ? '#F44336' : '#4CAF50') : 'rgba(255,255,255,0.4)';
        const ts = rj.Ultima_atualizacao || rj.Registro || '---';

        const card = document.createElement('div');
        card.className = `card${st !== 'waiting' ? ' ' + st : ''}`;
        card.dataset.eqId = eq.id;

        card.innerHTML = `
            <div class="card-header">
                <div class="card-name">
                    <i class="fas ${icon}"></i> ${eq.name}
                </div>
                <div class="status-badge ${st}">
                    <span class="badge-dot"></span>${label}
                </div>
            </div>
            <div class="card-detail">
                <span class="detail-label">Localização:</span>
                <span class="detail-value">${eq.location || '—'}</span>
            </div>
            <div class="card-detail">
                <span class="detail-label">Estado:</span>
                <span class="detail-value well-state-value" style="color:${wsColor};font-weight:700">${wsLabel}</span>
            </div>
            <div class="card-detail">
                <span class="detail-label">Modo:</span>
                <span class="detail-value modo-value" style="color:${autoColor};font-weight:700">${auto}</span>
            </div>
            <div class="card-detail">
                <span class="detail-label">Falha:</span>
                <span class="detail-value falha-value" style="color:${falhaColor};font-weight:700">${falha}</span>
            </div>
            <div class="card-detail">
                <span class="detail-label">Última Atualização:</span>
                <span class="detail-value ts-value" style="font-size:.78rem">${ts}</span>
            </div>
            ${eq.description ? `
            <div class="card-detail">
                <span class="detail-label">Descrição</span>
                <span class="detail-value">${eq.description}</span>
            </div>` : ''}
            <div class="card-footer">
                <button class="access-btn">
                    <i class="fas fa-tachometer-alt"></i> Acessar Painel de Controle
                </button>
            </div>`;

        const open = () => { window.location.href = `/painel?id=${eq.id}`; };
        card.querySelector('.access-btn').onclick = open;
        card.onclick = e => { if (!e.target.closest('.access-btn')) open(); };

        dash.appendChild(card);
    });
}

// ── INIT ─────────────────────────────────────────────────
document.getElementById('search').oninput = render;

load().then(() => {
    if (typeof mqtt !== 'undefined') connectMQTT();
    else setMqttBar('err', 'Biblioteca MQTT não carregada');
});

setInterval(load, 30000);
</script>
</body>
</html>
