<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGS Irrigação — Lista de Equipamentos (Poços)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary:  #2e7d32;
            --secondary:#00695c;
            --accent:   #2196F3;
            --success:  #4CAF50;
            --warning:  #FFC107;
            --danger:   #F44336;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
        body {
            background: linear-gradient(135deg,#1e3a8a,#1a2a6c,#0066cc);
            color: white; min-height:100vh; padding:20px;
        }
        .container {
            max-width: 1400px; margin:0 auto;
            background: rgba(0,0,0,0.7);
            border-radius:15px; padding:25px;
            box-shadow:0 10px 30px rgba(0,0,0,0.5);
        }
        header { text-align:center; margin-bottom:22px; padding-bottom:14px; border-bottom:2px solid var(--accent); }
        h1 { font-size:2.5rem; color:var(--accent); margin-bottom:6px; }
        .subtitle { font-size:1.1rem; opacity:.85; }

        /* MQTT status bar */
        .mqtt-bar {
            display: flex; align-items:center; justify-content:center;
            gap: 8px; margin-bottom:18px;
            font-size:.82rem; color:rgba(255,255,255,0.5);
        }
        .mqtt-dot {
            width:8px; height:8px; border-radius:50%;
            background:var(--warning); flex-shrink:0; transition:all .3s;
        }
        .mqtt-dot.ok  { background:var(--success); box-shadow:0 0 7px var(--success); animation:gpulse 2s infinite; }
        .mqtt-dot.err { background:var(--danger);  box-shadow:0 0 7px var(--danger); }

        @keyframes gpulse { 0%,100%{box-shadow:0 0 4px var(--success)} 50%{box-shadow:0 0 13px var(--success)} }
        @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:.35} }
        @keyframes pulse  { 0%{box-shadow:0 0 0 0 rgba(76,175,80,.7)} 70%{box-shadow:0 0 0 7px rgba(76,175,80,0)} 100%{box-shadow:0 0 0 0 rgba(76,175,80,0)} }

        /* Search */
        .filter-bar { display:flex; margin-bottom:20px; }
        .search-input {
            flex:1; padding:10px 14px;
            background:rgba(0,0,0,0.35); border:1px solid rgba(255,255,255,0.2);
            border-radius:7px; color:white; font-size:.9rem;
        }
        .search-input:focus { outline:none; border-color:var(--accent); }
        .search-input::placeholder { color:rgba(255,255,255,0.38); }

        /* Dashboard */
        .dashboard { display:grid; grid-template-columns:repeat(auto-fill,minmax(310px,1fr)); gap:18px; }

        /* Card */
        .card {
            background:rgba(30,30,50,0.85); border-radius:10px; padding:20px;
            box-shadow:0 5px 15px rgba(0,0,0,0.3); border-left:4px solid rgba(255,255,255,0.2);
            transition:all .35s; cursor:pointer;
        }
        .card:hover      { transform:translateY(-4px); box-shadow:0 10px 24px rgba(0,0,0,0.45); }
        .card.online     { border-left-color:var(--success); }
        .card.offline    { border-left-color:var(--danger); }

        .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:13px; gap:8px; }
        .card-name   { font-size:1.2rem; font-weight:bold; color:var(--accent); display:flex; align-items:center; gap:7px; flex-wrap:wrap; }

        /* Status badge */
        .status-badge {
            display: inline-flex; align-items:center; gap:5px;
            border-radius:12px; padding:4px 11px;
            font-size:.7rem; font-weight:700; white-space:nowrap; flex-shrink:0;
            transition: all .35s;
        }
        .status-badge.waiting {
            background:rgba(255,179,0,0.14); border:1px solid rgba(255,179,0,0.38); color:var(--warning);
        }
        .status-badge.online {
            background:rgba(76,175,80,0.18); border:1px solid var(--success); color:var(--success);
        }
        .status-badge.offline {
            background:rgba(244,67,54,0.14); border:1px solid rgba(244,67,54,0.45); color:var(--danger);
        }
        .badge-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
        .status-badge.waiting .badge-dot { background:var(--warning); animation:blink 1.2s infinite; }
        .status-badge.online  .badge-dot { background:var(--success); animation:pulse 2s infinite; }
        .status-badge.offline .badge-dot { background:var(--danger); }

        .type-chip {
            display:inline-block; background:rgba(33,150,243,0.15);
            border:1px solid rgba(33,150,243,0.32); border-radius:9px;
            padding:2px 8px; font-size:.7rem; font-weight:600;
        }
        .card-detail { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px dashed rgba(255,255,255,0.11); font-size:.86rem; }
        .card-detail:last-of-type { border-bottom:none; }
        .detail-label { font-weight:600; color:rgba(255,255,255,0.65); }
        .detail-value { color:var(--accent); text-align:right; }

        .card-footer { margin-top:13px; }
        .access-btn {
            width:100%; padding:11px; border:none; border-radius:7px;
            background:var(--accent); color:white; font-weight:bold; font-size:.92rem;
            cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
            transition:all .25s;
        }
        .access-btn:hover { background:#1976D2; transform:translateY(-2px); }

        .loading,.empty { grid-column:1/-1; text-align:center; padding:40px; opacity:.7; }
        .empty i { font-size:3rem; display:block; margin-bottom:13px; }

        @media (max-width:768px) {
            h1 { font-size:2rem; }
            .dashboard { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1><i class="fas fa-water"></i> AGS Irrigação</h1>
        <p class="subtitle"></p>
    </header>

    <div class="mqtt-bar">
        <div class="mqtt-dot" id="mqtt-dot"></div>
        <span id="mqtt-label">Conectando ao sistema...</span>
    </div>

    <div class="filter-bar">
        <input class="search-input" id="search" placeholder="🔍  Buscar por nome ou localização...">
    </div>

    <div class="dashboard" id="dashboard">
        <div class="loading"><i class="fas fa-spinner fa-spin"></i> Carregando equipamentos...</div>
    </div>
</div>

<script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
<script>
const BROKER    = 'wss://mqtt.aguasanta.agr.br';
const MQTT_USER = 'coas';
const MQTT_PASS = 'AguaSanta@452';

let equipments = [];
let mqttClient = null;
const deviceStatus = {}; // poco_id → 'online' | 'offline' | 'waiting'
const wellState    = {}; // poco_id → 'LIGADO' | 'DESLIGADO' | null

const ICONS = {
    'Poço':         'fa-tint',
    'Pivô Central': 'fa-sync-alt',
    'Linear':       'fa-arrows-alt-h',
    'Aspersor':     'fa-shower',
    'Pluviômetro':  'fa-cloud-rain',
    'Outro':        'fa-cog'
};

// ── MQTT ─────────────────────────────────────────────────
function connectMQTT() {
    mqttClient = mqtt.connect(BROKER, {
        clientId:       'AGS_OpList_' + Math.random().toString(16).substr(2, 8),
        username:       MQTT_USER,
        password:       MQTT_PASS,
        keepalive:      60,
        clean:          true,
        connectTimeout: 6000,
        reconnectPeriod:4000,
    });

    mqttClient.on('connect', () => {
        setMqttBar('ok', 'Sistema Online');
        subscribeAll();
    });

    mqttClient.on('message', (topic, payload) => {
        const msg = payload.toString().trim();

        // ── tópico status (online/offline) ──
        const eqByStatus = equipments.find(e => e.topic_status === topic);
        if (eqByStatus) {
            const st = (msg.toLowerCase() === 'online') ? 'online' : 'offline';
            if (deviceStatus[eqByStatus.poco_id] !== st) {
                deviceStatus[eqByStatus.poco_id] = st;
                updateCardBadge(eqByStatus.id, st);
            }
            return;
        }

        // ── tópico dados (JSON com estado do poço) ──
        const eqByDados = equipments.find(e => e.topic_dados === topic);
        if (eqByDados) {
            try {
                const data = JSON.parse(msg);
                const ligado = data.Ligado_desligado === '1' || data.Ligado_desligado === 1;
                const estado = ligado ? 'LIGADO' : 'DESLIGADO';
                if (wellState[eqByDados.poco_id] !== estado) {
                    wellState[eqByDados.poco_id] = estado;
                    updateCardWellState(eqByDados.id, estado);
                }
            } catch(_) {}
        }
    });

    mqttClient.on('reconnect', () => setMqttBar('warn', 'Reconectando...'));
    mqttClient.on('close',     () => setMqttBar('err',  'Desconectado'));
    mqttClient.on('error',     () => setMqttBar('err',  'Erro na conexão'));
}

function subscribeAll() {
    equipments.forEach(eq => {
        if (eq.topic_status) mqttClient.subscribe(eq.topic_status, { qos:1 });
        if (eq.topic_dados)  mqttClient.subscribe(eq.topic_dados,  { qos:1 });
    });
}

function setMqttBar(state, label) {
    const dot = document.getElementById('mqtt-dot');
    dot.className = 'mqtt-dot' + (state === 'ok' ? ' ok' : state === 'err' ? ' err' : '');
    document.getElementById('mqtt-label').textContent = label;
}

// Atualiza badge e borda do card sem re-renderizar a página inteira
function updateCardBadge(eqId, status) {
    const card  = document.querySelector(`.card[data-eq-id="${eqId}"]`);
    const badge = card && card.querySelector('.status-badge');
    if (!card || !badge) return;
    card.classList.remove('online','offline');
    card.classList.add(status);
    badge.className = `status-badge ${status}`;
    const label = status === 'online' ? 'Online' : 'Offline';
    badge.innerHTML = `<span class="badge-dot"></span>${label}`;
}

// Atualiza o estado do poço (LIGADO/DESLIGADO) no card
function updateCardWellState(eqId, estado) {
    const el = document.querySelector(`.card[data-eq-id="${eqId}"] .well-state-value`);
    if (!el) return;
    el.textContent = estado;
    el.style.color = estado === 'LIGADO' ? '#4CAF50' : '#F44336';
}

// ── LOAD ─────────────────────────────────────────────────
async function load() {
    try {
        const r = await fetch('/api/equipments');
        equipments = await r.json();
        // Marca todos como aguardando (não reseta os que já têm status)
        equipments.forEach(eq => {
            if (!deviceStatus[eq.poco_id]) deviceStatus[eq.poco_id] = 'waiting';
            if (!wellState[eq.poco_id])    wellState[eq.poco_id]    = null;
        });
        render();
        // Se MQTT já conectado, inscreve nos novos equipamentos
        if (mqttClient && mqttClient.connected) subscribeAll();
    } catch(e) {
        document.getElementById('dashboard').innerHTML =
            '<div class="empty"><i class="fas fa-exclamation-triangle"></i><p>Erro ao carregar. Atualize a página.</p></div>';
    }
}

// ── RENDER ────────────────────────────────────────────────
function render() {
    const search = document.getElementById('search').value.toLowerCase();
    const dash   = document.getElementById('dashboard');
    dash.innerHTML = '';

    const filtered = equipments.filter(eq =>
        !search
        || eq.name.toLowerCase().includes(search)
        || (eq.location || '').toLowerCase().includes(search)
        || eq.poco_id.toLowerCase().includes(search)
    );

    if (filtered.length === 0) {
        dash.innerHTML = '<div class="empty"><i class="fas fa-search"></i><p>Nenhum equipamento encontrado.</p></div>';
        return;
    }

    filtered.forEach(eq => {
        const icon  = ICONS[eq.type] || 'fa-cog';
        const st    = deviceStatus[eq.poco_id] || 'waiting';
        const label = st === 'online' ? 'Online' : st === 'offline' ? 'Offline' : 'Aguardando...';
        const ws    = wellState[eq.poco_id];
        const wsLabel = ws || '---';
        const wsColor = ws === 'LIGADO' ? '#4CAF50' : ws === 'DESLIGADO' ? '#F44336' : 'rgba(255,255,255,0.4)';

        const card = document.createElement('div');
        card.className = `card${st !== 'waiting' ? ' ' + st : ''}`;
        card.dataset.eqId = eq.id;

        card.innerHTML = `
            <div class="card-header">
                <div class="card-name">
                    <i class="fas ${icon}"></i> ${eq.name}
                    <span class="type-chip">${eq.type}</span>
                </div>
                <div class="status-badge ${st}">
                    <span class="badge-dot"></span>${label}
                </div>
            </div>
            <div class="card-detail">
                <span class="detail-label">Localização:</span>
                <span class="detail-value">${eq.location || '—'}</span>
            </div>
            <div class="card-detail">
                <span class="detail-label">ID do Poço:</span>
                <span class="detail-value"><code>${eq.poco_id}</code></span>
            </div>
            <div class="card-detail">
                <span class="detail-label">Estado do Poço:</span>
                <span class="detail-value well-state-value" style="color:${wsColor};font-weight:700">${wsLabel}</span>
            </div>
            ${eq.description ? `
            <div class="card-detail">
                <span class="detail-label">Descrição:</span>
                <span class="detail-value">${eq.description}</span>
            </div>` : ''}
            <div class="card-footer">
                <button class="access-btn">
                    <i class="fas fa-tachometer-alt"></i> Acessar Painel
                </button>
            </div>`;

        const open = () => { window.location.href = `/painel?id=${eq.id}`; };
        card.querySelector('.access-btn').onclick = open;
        card.onclick = e => { if (!e.target.closest('.access-btn')) open(); };

        dash.appendChild(card);
    });
}

// ── INIT ─────────────────────────────────────────────────
document.getElementById('search').oninput = render;

load().then(() => {
    if (typeof mqtt !== 'undefined') connectMQTT();
    else setMqttBar('err', 'Biblioteca MQTT não carregada');
});

setInterval(load, 30000);
</script>
</body>
</html>
